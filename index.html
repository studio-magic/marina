<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まりなのお話会</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #fbeaf0;
    display: flex;
    justify-content: center;
  }
  .lp {
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    background: #fff;
  }
  .lp img {
    display: block;
    width: 100%;
    height: auto;
  }
  .section {
    position: relative;
    line-height: 0;
  }
  .hotspot {
    position: absolute;
    display: block;
    /* デバッグ用に枠線を見たい時は下のコメントを外す */
    /* outline: 1px solid red; */
  }
  .gap {
    height: 14px;
    background: #f9f1ec;
  }
</style>
</head>
<body>
<div class="lp">

  <!-- 1.png : 下部に Instagram / オープンチャット ボタンあり -->
  <div class="section">
    <img src="images/1.png" alt="ひとりで抱えなくていい。まりなのお話会">
    <a class="hotspot" href="https://www.instagram.com/mappppppb" target="_blank" rel="noopener"
       style="left:4.20%; top:90.10%; width:45.12%; height:8.59%;"></a>
    <a class="hotspot" href="#" data-link="openchat" target="_blank" rel="noopener"
       style="left:51.37%; top:90.10%; width:43.07%; height:8.59%;"></a>
  </div>

  <div class="section"><img src="images/2.png" alt=""></div>
  <div class="section"><img src="images/3.png" alt=""></div>
  <div class="gap"></div>
  <div class="section"><img src="images/4.png" alt=""></div>
  <div class="gap"></div>
  <div class="section"><img src="images/5.png" alt=""></div>
  <div class="section"><img src="images/6.png" alt=""></div>
  <div class="section"><img src="images/7.png" alt=""></div>
  <div class="section"><img src="images/8.png" alt=""></div>

  <!-- 9.png : Instagram DM / オープンチャット ボタンあり -->
  <div class="section">
    <img src="images/9.png" alt="気になる方はこちらからどうぞ">
    <a class="hotspot" href="https://www.instagram.com/mappppppb" target="_blank" rel="noopener"
       style="left:8.07%; top:79.30%; width:37.50%; height:9.96%;"></a>
    <a class="hotspot" href="#" data-link="openchat" target="_blank" rel="noopener"
       style="left:53.45%; top:79.30%; width:38.22%; height:9.96%;"></a>
  </div>

  <div class="section"><img src="images/10.png" alt=""></div>

  <!-- 11.png : Instagram / LINE 申し込みボタンあり -->
  <div class="section">
    <img src="images/11.png" alt="まずは気軽に遊びに来てください">
    <a class="hotspot" href="https://www.instagram.com/mappppppb" target="_blank" rel="noopener"
       style="left:6.26%; top:61.81%; width:87.29%; height:15.26%;"></a>
    <a class="hotspot" href="#" data-link="openchat" target="_blank" rel="noopener"
       style="left:6.26%; top:79.06%; width:87.29%; height:13.95%;"></a>
  </div>

</div>
</body>
</html>
